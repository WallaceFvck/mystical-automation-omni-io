license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="rimur"
description='''
Adds omni-side item input/output to Mystical Automation machines and lets
compatible machines resolve recipes from their real input inventory.
'''

[[mixins]]
config="${mod_id}.mixins.json"
requiredMods=["mysticalautomation"]

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="mysticalautomation"
type="required"
versionRange="[2.0.6,2.1)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="cucumber"
type="required"
versionRange="[9.0.3,10)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="mysticalagriculture"
type="required"
versionRange="[9.0.3,10)"
ordering="AFTER"
side="BOTH"
